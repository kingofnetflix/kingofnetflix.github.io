<html lang="en">
<head>
    <title>Reel Proxy</title>
    <style>
        @keyframes loading {
            0% { content: "loading"; }
            25% { content: "loading."; }
            50% { content: "loading.."; }
            75% { content: "loading..."; }
        }
        #idiot::after {
            content: "loading";
            animation: loading 1s infinite;
        }
    </style>
</head>
<body>
    <p id="idiot"></p>
</body>
</html>
